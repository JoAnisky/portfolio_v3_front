apiVersion: apps/v1
kind: Deployment
metadata:
    name: nuxt-front
    namespace: portfoliov3-front
spec:
    replicas: 1
    selector:
        matchLabels:
            app: nuxt-front
    template:
        metadata:
            labels:
                app: nuxt-front
        spec:
            containers:
                - name: app
                  image: joanisky/portfoliov3-front:latest
                  imagePullPolicy: Always
                  ports:
                      - containerPort: 3000
                        name: http
                  envFrom:
                      - configMapRef:
                            name: nuxt-front-config
                      - secretRef:
                            name: nuxt-env
                  resources:
                      requests:
                          memory: "128Mi"
                          cpu: "100m"
                      limits:
                          memory: "256Mi"
                          cpu: "200m"
                  livenessProbe:
                      httpGet:
                          path: /
                          port: 3000
                      initialDelaySeconds: 30
                      periodSeconds: 20
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /
                          port: 3000
                      initialDelaySeconds: 10
                      periodSeconds: 10
                      timeoutSeconds: 3
                      failureThreshold: 3
